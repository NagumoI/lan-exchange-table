<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン — 交換テーブル</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
      .auth-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .auth-card {
        width: min(400px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .auth-card .eyebrow { margin-bottom: 4px; }
      .auth-card h1 { font-size: 2rem; margin-bottom: 28px; }
      .auth-form { display: grid; gap: 16px; }
      .error-msg {
        padding: 10px 14px;
        border-radius: 8px;
        background: #fef2f2;
        color: #b91c1c;
        font-size: 0.88rem;
        display: none;
      }
      .error-msg.visible { display: block; }
      .primary-button { width: 100%; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <p class="eyebrow">LAN private table</p>
        <h1>ログイン</h1>

        <div class="auth-form">
          <p id="error" class="error-msg" role="alert"></p>

          <label>
            <span>ID</span>
            <input id="username" type="text" autocomplete="username"
                   placeholder="ユーザーID" autofocus>
          </label>

          <label>
            <span>パスワード</span>
            <input id="password" type="password" autocomplete="current-password"
                   placeholder="••••••••">
          </label>

          <button id="login-btn" class="primary-button" type="button">
            ログイン
          </button>
        </div>
      </div>
    </div>

    <script>
      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const errorEl    = document.getElementById('error');
      const loginBtn   = document.getElementById('login-btn');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
      }

      async function doLogin() {
        errorEl.classList.remove('visible');
        loginBtn.disabled = true;
        loginBtn.textContent = '確認中…';

        try {
          const res = await fetch('/api/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
              username: usernameEl.value.trim(),
              password: passwordEl.value,
            }),
          });
          const data = await res.json();
          if (data.ok) {
            location.href = data.next;
          } else {
            showError(data.message);
          }
        } catch {
          showError('通信エラーが発生しました。');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = 'ログイン';
        }
      }

      loginBtn.addEventListener('click', doLogin);
      [usernameEl, passwordEl].forEach(el =>
        el.addEventListener('keydown', e => e.key === 'Enter' && doLogin())
      );
    </script>
  </body>
</html>
